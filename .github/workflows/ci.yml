name: ci

on:
  push:
  pull_request:

jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install subgraph dependencies
        run: npm ci --prefix subgraph

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Lint Solidity
        run: npm run lint:sol

      - name: Check frontend formatting
        run: npm run format:check --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Generate subgraph types
        run: npm run codegen --prefix subgraph

      - name: Build subgraph
        run: npm run build --prefix subgraph

      - name: Build
        run: forge build

      - name: Test
        run: forge test

      - name: Coverage
        run: forge coverage --report summary

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "src"
          slither-args: '--exclude-dependencies --filter-paths "(src/flat_)" --exclude solc-version'
