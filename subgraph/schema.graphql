type Asset @entity(immutable: false)  {
  id: ID!
  issuer: Bytes!
  reserveAsset: Bytes!
  assetToken: Bytes!
  vault: Bytes!
  maxSupply: BigInt!
  metadataURI: String!
  active: Boolean!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type VaultPosition @entity(immutable: false)  {
  id: ID!
  user: Bytes!
  vault: Bytes!
  deposited: BigInt!
  assetTokenMinted: BigInt!
  createdAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type Proposal @entity(immutable: false)  {
  id: ID!
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  state: String!
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type Vote @entity(immutable: false)  {
  id: ID!
  proposal: Proposal!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type Swap @entity(immutable: false)  {
  id: ID!
  trader: Bytes!
  amountIn: BigInt!
  amountOut: BigInt!
  isTokenA: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
}
