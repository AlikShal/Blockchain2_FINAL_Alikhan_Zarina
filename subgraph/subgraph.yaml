specVersion: 1.0.0

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: AssetRegistry
    network: sepolia

    source:
      address: "0xbc8Bb735CD83eFa5439481b639014DAC4ceE1092"
      abi: AssetRegistry
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript

      entities:
        - Asset

      abis:
        - name: AssetRegistry
          file: ./abis/AssetRegistry.json

      eventHandlers:
        - event: AssetRegistered(indexed bytes32,indexed address,address,address,address,uint256,string)
          handler: handleAssetRegistered

        - event: AssetActiveSet(indexed bytes32,bool)
          handler: handleAssetActiveSet

      file: ./src/protocol.ts

  - kind: ethereum
    name: AssetVault
    network: sepolia

    source:
      address: "0x9F114A7f9af9FAAb86de10C1A43Ac3cAC482388B"
      abi: AssetVault
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript

      entities:
        - VaultPosition

      abis:
        - name: AssetVault
          file: ./abis/AssetVault.json

      eventHandlers:
        - event: DepositRecorded(indexed address,uint256)
          handler: handleDepositRecorded

        - event: WithdrawalRecorded(indexed address,uint256)
          handler: handleWithdrawalRecorded

        - event: TokensMinted(indexed address,uint256)
          handler: handleTokensMinted

      file: ./src/protocol.ts

  - kind: ethereum
    name: AMM
    network: sepolia

    source:
      address: "0x9A5F0dF96c9333bC81f56c4CAb7956d9D47A298a"
      abi: AMM
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript

      entities:
        - Swap

      abis:
        - name: AMM
          file: ./abis/AMM.json

      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,bool)
          handler: handleSwap

      file: ./src/protocol.ts

  - kind: ethereum
    name: ProtocolGovernor
    network: sepolia

    source:
      address: "0xE1071aD02D88fBFB1F6998e4AFf28b641CBb7E24"
      abi: ProtocolGovernor
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript

      entities:
        - Proposal
        - Vote

      abis:
        - name: ProtocolGovernor
          file: ./abis/ProtocolGovernor.json

      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated

        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled

        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued

        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted

        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast

      file: ./src/protocol.ts